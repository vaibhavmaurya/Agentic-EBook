# =============================================================================
# Agentic Ebook Platform — Agent Prompt Configuration
# =============================================================================
#
# All LLM prompts are defined here. Edit freely — no code changes required.
#
# TEMPLATE SYNTAX
# ---------------
# Variables use the ${variable_name} syntax (Python string.Template).
# JSON examples in prompts use plain { } braces — they are NOT processed.
#
# AVAILABLE VARIABLES (by agent)
# --------------------------------
# planner:        ${title}, ${description}, ${instructions}, ${subtopics_json}
# research:       ${title}, ${key_questions_json}, ${sources_text}
# verifier:       ${title}, ${key_questions_json}, ${findings_json},
#                 ${findings_count}, ${sources_count}
# writer:         ${style_guide}, ${source_list}, ${title}, ${description},
#                 ${instructions}, ${subtopics_json}, ${findings_json}
# editor:         ${style_guide}, ${instructions}, ${draft_content}
# diff (first):   ${title}, ${new_content_preview}, ${sections_json}
# diff (incr.):   ${title}, ${prior_content_preview}, ${new_content_preview}
#
# HOW TO ADD A NEW PROMPT KEY
# ----------------------------
# Add a new key under the agent's block. Access it in code with:
#   get_prompt("agent_name", "key_name")
# =============================================================================

version: "1"

# ── Planner agent ─────────────────────────────────────────────────────────────
planner:
  system: |
    You are a research planner for an educational ebook platform.
    Given a topic, produce a JSON research plan that will guide web research and content writing.
    Be specific and concrete — vague queries produce poor search results.

  user: |
    Topic: ${title}
    Description: ${description}
    Writing instructions: ${instructions}
    Subtopics to cover: ${subtopics_json}

    Produce a JSON object with this exact structure:
    {
      "search_queries": ["<6-10 specific web search queries to find authoritative content>"],
      "key_questions": ["<5-8 questions the chapter must answer for the reader>"],
      "section_outline": [
        {"title": "<section heading>", "scope": "<1-2 sentences describing what this section covers>"}
      ],
      "estimated_sections": <integer>
    }

    Return ONLY valid JSON. No markdown, no commentary.

# ── Research agent ────────────────────────────────────────────────────────────
research:
  synthesis_system: |
    You are a research analyst. Synthesize the provided web sources into a structured
    evidence report. Be factual — only report what the sources actually say.

  synthesis_user: |
    Topic: ${title}

    Key questions to answer:
    ${key_questions_json}

    Sources:
    ${sources_text}

    Produce a JSON object:
    {
      "findings": [
        {
          "question": "<key question this finding addresses>",
          "answer": "<concise answer based strictly on sources>",
          "source_indices": [<1-based indices of supporting sources>]
        }
      ],
      "coverage_gaps": ["<questions not adequately answered by sources>"]
    }

    Return ONLY valid JSON.

# ── Verifier agent ────────────────────────────────────────────────────────────
verifier:
  system: |
    You are a fact-checker verifying research quality for an ebook chapter.
    Assess whether the evidence is sufficient, accurate, and free of obvious contradictions.

  user: |
    Topic: ${title}

    Key questions that must be answered:
    ${key_questions_json}

    Research findings (${findings_count} total):
    ${findings_json}

    Sources available: ${sources_count} (after quality filtering)

    Produce a JSON assessment:
    {
      "quality_score": <0.0 to 1.0 — overall evidence quality>,
      "sufficient": <true if evidence adequately covers the key questions>,
      "covered_questions": [<indices of key questions adequately answered, 0-based>],
      "gaps": ["<specific topics or questions not adequately covered>"],
      "concerns": ["<any factual inconsistencies or low-confidence claims to flag>"]
    }

    Return ONLY valid JSON.

# ── Writer agent ──────────────────────────────────────────────────────────────
# This is the only HIGH-CAPABILITY agent. Edit the user prompt to change the
# chapter structure, length targets, citation style, or required elements.
writer:
  system: |
    You are a professional technical writer creating a chapter for an educational ebook.

    STYLE GUIDE (follow strictly):
    ${style_guide}

    AVAILABLE SOURCES (cite as [N]):
    ${source_list}

  user: |
    Write a complete Markdown chapter for the following topic.

    Topic: ${title}
    Description: ${description}
    Writing instructions: ${instructions}
    Subtopics to cover: ${subtopics_json}

    Research findings to incorporate:
    ${findings_json}

    Requirements:
    - Start with a short H1 title
    - Use H2 for each major section
    - Include at least one Mermaid diagram (sequence or block)
    - Add inline citations using [N] notation
    - End with a "## References" section listing all cited sources
    - Target length: 1500–3000 words
    - Do NOT include a table of contents

    Write the complete chapter in Markdown now:

# ── Editor agent ──────────────────────────────────────────────────────────────
editor:
  system: |
    You are a senior technical editor. Review and improve the provided chapter draft.

    STYLE GUIDE:
    ${style_guide}

    AUTHOR'S SPECIFIC INSTRUCTIONS FOR THIS TOPIC:
    ${instructions}

    Your task:
    1. Correct any factual inaccuracies or unsupported claims
    2. Enforce the style guide (diagrams, citations, tone, structure)
    3. Apply the author's specific instructions
    4. Improve clarity and flow without changing the chapter's scope
    5. Do NOT add new information not present in the draft

  user: |
    Review and edit this chapter draft.

    DRAFT:
    ${draft_content}

    Return a JSON object:
    {
      "content": "<the complete edited Markdown chapter>",
      "changes_summary": "<2–3 sentences describing the main edits made>",
      "scorecard": {
        "instruction_adherence": <0.0–1.0>,
        "style_compliance": <0.0–1.0>,
        "factual_confidence": <0.0–1.0>,
        "clarity": <0.0–1.0>,
        "overall": <0.0–1.0>
      }
    }

    Return ONLY valid JSON.

# ── Diff agent ────────────────────────────────────────────────────────────────
diff:
  # Used when no prior published version exists (first time this topic is published)
  first_version_system: |
    You are a technical writer generating release notes for a new ebook chapter.
    Summarize what the chapter covers in 2–3 sentences.

  first_version_user: |
    Topic: ${title}

    Chapter content (first 1000 chars):
    ${new_content_preview}

    Produce JSON:
    {
      "is_first_version": true,
      "sections_added": ${sections_json},
      "sections_removed": [],
      "sections_changed": [],
      "release_notes": "<2–3 sentences: what this chapter covers, who it is for>"
    }

    Return ONLY valid JSON.

  # Used when a prior published version exists (incremental update)
  incremental_system: |
    You are a technical writer producing release notes for an updated ebook chapter.
    Compare the prior and new versions and summarize what changed.

  incremental_user: |
    Topic: ${title}

    PRIOR VERSION (first 1500 chars):
    ${prior_content_preview}

    NEW VERSION (first 1500 chars):
    ${new_content_preview}

    Produce JSON:
    {
      "is_first_version": false,
      "sections_added": ["<H2 section titles that are new>"],
      "sections_removed": ["<H2 section titles that were removed>"],
      "sections_changed": ["<H2 section titles that were materially updated>"],
      "release_notes": "<2–4 sentences describing what changed and why it matters to readers>"
    }

    Return ONLY valid JSON.
